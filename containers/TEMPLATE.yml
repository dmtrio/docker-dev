# containers/<name>.yml — one manifest = one container. The assembly is a config.
#
#   cp containers/TEMPLATE.yml containers/personal-site.yml   # filename = container name
#   vim containers/personal-site.yml
#   ./up.sh personal-site                                     # idempotent — rerun after edits
#
# Everything here is secret-free and committable. Secret VALUES live in
# ~/dev-agent/secrets.env and are referenced by naming convention (below).
# Derived state (keys/, the container, generated configs) is disposable:
# up.sh rebuilds all of it from this file + secrets.env.

task: coding                       # label: coding | research | ... (informational)
repo: ""                           # https URL cloned to /workspace/main (blank = git init)
forge: github                      # github | gitea

git:
  name: ""                         # blank = your host git config
  email: ""

memory: 10g

# Optional — SSH access for remote hosts (homelab/VPS): publishes sshd on
# the host and enables it at runtime. Requires SSH_AUTHORIZED_KEY (your
# public key) in secrets.env. Omit the whole section on the Mac (attach
# mode needs no SSH). Keep bind at 127.0.0.1 and front with a tunnel
# (Pangolin/Tailscale) — never expose sshd to the open internet.
#ssh:
#  port: 2222
#  bind: 127.0.0.1

# Agent CLIs baked into the image. Omit this key entirely = all of them.
tools: [claude, codex, pi, gemini, cursor, aider]

# Capability grants. Each maps to a Mac-side service port, its secret in
# secrets.env, the firewall rule, and a generated MCP entry for Claude Code.
#   gateway  → 8811, MCP_GATEWAY_TOKEN     (run-gateway-coding.sh — headless Playwright)
#   proxyman → 8813, PROXYMAN_BRIDGE_KEY   (run-proxyman-bridge.sh — traffic capture)
#   browser  → 8814, RESEARCH_BROWSER_KEY  (run-research-browser.sh — watchable desktop browser)
capabilities:
  gateway: false
  proxyman: false
  browser: false
  egress: []                       # extra allowed outbound domains, e.g. [api.stripe.com]
  egress_cidrs: []                 # IP-range escape hatch, e.g. LAN subnets:
                                   #   [192.168.35.0/24, 192.168.20.0/24]

# Per-agent identities — EXPLICIT references to secrets.env names.
# An entry R reads OBSIDIAN_KEY_R (obsidian) or OBSIDIAN_WATCH_KEY_R (watch);
# the agent it belongs to is R's suffix: _claude, _codex, _pi, _gemini,
# _cursor_agent. up.sh validates every reference at apply time and HARD-FAILS
# if a key is missing from secrets.env or a suffix isn't a known agent.
# Any obsidian entry also allowlists the Annotated endpoint.
#
# Example:
#   identities:
#     obsidian: [personal_site_claude, default_gemini]
#     watch: [personal_site_claude]
# reads from ~/dev-agent/secrets.env (see .env.example):
#   OBSIDIAN_KEY_personal_site_claude=ann_additive_…   → claude
#   OBSIDIAN_KEY_default_gemini=ann_additive_…         → gemini (shared identity)
#   OBSIDIAN_WATCH_KEY_personal_site_claude=ann_poll_… → claude
identities:
  obsidian: []
  watch: []
