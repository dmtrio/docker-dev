# containers/<name>.yml — one manifest = one container. The assembly is a config.
#
#   cp containers/TEMPLATE.yml containers/personal-site.yml   # filename = container name
#   vim containers/personal-site.yml
#   ./up.sh personal-site                                     # idempotent — rerun after edits
#
# Everything here is secret-free and committable. Secret VALUES live in
# secrets.env (default ./.dev-agent/secrets.env) and are referenced by naming convention (below).
# Derived state (keys/, the container, generated configs) is disposable:
# up.sh rebuilds all of it from this file + secrets.env.

task: coding                       # label: coding | research | ... (informational)
#repos:                            # each → /workspace/repos/<name>; omit/empty →
#                                  # git init at /workspace/repos/scratch
#  - https://github.com/org/app.git                # name = URL basename
#  - {name: lib, url: https://github.com/org/lib.git}
forge: github                      # github | gitea

git:
  name: ""                         # blank = your host git config
  email: ""
  # token: (optional) the secrets.env VAR NAME holding this container's default
  # git credential. Absent → the global GH_TOKEN (shared machine user). Set it
  # to give the container its own identity token. up.sh HARD-FAILS if the named
  # var isn't set in secrets.env (never a silent fall-back to the wrong token).
  #   token: GH_TOKEN_hank
  # orgs: (optional) per-owner credential + identity overrides, keyed by forge
  # org/user name. A repo owned by <owner> authenticates with GH_TOKEN_<owner>
  # (routed by git-credential-org) and, if name/email are given, commits under
  # that identity. Single-org containers need no orgs: — git.token covers them.
  #   orgs:
  #     vendor:
  #       token: GH_TOKEN_vendor   # secrets.env var name (required per org)
  #       name:  "Vendor Bot"      # optional — repo-local user.name for vendor/*
  #       email: "bot@vendor.io"   # optional — repo-local user.email for vendor/*

memory: 10g

# Optional — SSH access for remote hosts (a Linux server or VPS): publishes sshd on
# the host and enables it at runtime. Requires SSH_AUTHORIZED_KEY (your
# public key) in secrets.env. Omit the whole section on the Mac (attach
# mode needs no SSH). Keep bind at 127.0.0.1 and front with your
# WireGuard/VPN tunnel — never expose sshd to the open internet.
#ssh:
#  port: 2222
#  bind: 127.0.0.1

# Optional — remote agent access (RFC 04). Extends ssh: (required) so you
# can drive agents from a phone: SSH/mosh logins land attached to ONE
# durable tmux session (phone + laptop share the view; agents survive
# disconnects), mosh rides UDP 60000-60010 for flaky mobile networks, and
# notify pushes to your phone when an agent goes idle waiting for input.
# Everything is reached over your WireGuard/VPN tunnel — nothing public.
# notify: ntfy needs NTFY_URL (and optional NTFY_TOPIC) in secrets.env;
# the ntfy host is auto-added to this container's egress allowlist.
# mosh_ports (optional, START:END, default 60000:60010): host UDP ports are
# exclusive, so give each mosh container on one host its own range — same
# reason each has its own ssh.port. notify requires tmux (the idle monitor
# lives inside the tmux session). A self-hosted ntfy on a plain LAN
# hostname needs the IP in capabilities.egress_cidrs instead (the domain
# allowlist is DNS-driven); an IP-literal NTFY_URL is handled automatically.
#remote:
#  tmux: true
#  mosh: true
#  mosh_ports: 60000:60010
#  notify: ntfy

# Agent CLIs baked into the image. Omit this key entirely = all of them.
tools: [claude, codex, pi, gemini, cursor, aider]

# Firewall egress. Extra outbound the base allowlist doesn't already cover.
capabilities:
  egress: []                       # extra allowed outbound domains, e.g. [api.stripe.com]
  egress_cidrs: []                 # IP-range escape hatch, e.g. LAN subnets:
                                   #   [192.168.35.0/24, 192.168.20.0/24]
# (The gateway/proxyman/browser flags that used to live here are DEPRECATED —
#  they are plugins now. `capabilities: {gateway: true}` still works for one
#  release but prints a warning; prefer `plugins: [gateway]` below.)

# Plugins — every MCP server a container can get is a plugins/<name>/ directory.
# Listing a name here wires it into this container; unlisted plugins stay dormant
# in the shared image. LOCAL plugins run stdio inside the container (baked, wired
# into every agent); REMOTE plugins are HTTP servers, some backed by a Mac-side
# service you start once with ./service.sh <name>. See plugins/README.md for the
# schema, and each plugins/<name>/README.md for what a plugin does + its token.
#
#   plugins: [serena, gateway, obsidian-annotated]   # serena: local; others remote
plugins: []

# Env-scoped plugin secrets. An ENV-SCOPED slot (its secrets: scope is `env`) is
# one value shared by every agent (a remote service token). Enabling the plugin
# is enough to wire it: each slot
# defaults to a same-named var in secrets.env. Name it here to make the binding
# explicit AND to re-point THIS container's slot at a different secret.
#   common_secrets:
#     SLOT: SOURCE_VAR        # map form: source SLOT from SOURCE_VAR (re-point)
#     - EXTRA_VAR             # list form: pass an extra secrets.env var through
# up.sh warns (does not fail) if a source var is missing from secrets.env — the
# service just won't authenticate until it's set. An agent-scoped slot does NOT
# go here (it errors) — bind it under agent_secrets below.
#
# Example (two containers, one gateway plugin, different tokens):
#   plugins: [gateway]
#   common_secrets: {MCP_GATEWAY_TOKEN: MCP_GATEWAY_TOKEN}      # this container
#   # …another container.yml…
#   common_secrets: {MCP_GATEWAY_TOKEN: MCP_GATEWAY_TOKEN_prod} # points elsewhere
common_secrets: {}

# Per-agent secret bindings. An AGENT-SCOPED plugin (its secrets: slot is
# `agent`) is wired only for the agents you bind here, each presenting its OWN
# key. A binding is a flat record: which agent, which slot the plugin declares,
# and which secrets.env var supplies that agent's value.
# up.sh HARD-FAILS at apply time if a source var is missing from secrets.env or
# the agent/slot is unknown. See each plugins/<name>/README.md for its slot name.
#
# Example:
#   plugins: [obsidian-annotated, annotated-watch]
#   agent_secrets:
#     - {agent: claude, slot: OBSIDIAN_ANNOTATED_KEY, secret: OBSIDIAN_KEY_site_claude}
#     - {agent: gemini, slot: OBSIDIAN_ANNOTATED_KEY, secret: OBSIDIAN_KEY_site_gemini}
#     - {agent: claude, slot: ANNOTATED_WATCH_KEY,    secret: OBSIDIAN_WATCH_KEY_site_claude}
# (the secret: values are var names in secrets.env; see secrets.env.example)
#
# (The old `identities: {obsidian: [...], watch: [...]}` ref-suffix form still
#  works for one release but prints a deprecation warning — prefer agent_secrets.)
agent_secrets: []
