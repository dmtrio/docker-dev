# docker-compose.mosh.yml — overlay added by up.sh when the manifest has
# remote.mosh: true (requires the ssh: section; always stacked on the ssh
# overlay). Publishes the mosh UDP range next to sshd — same bind rules:
# loopback by default, fronted by your WireGuard/VPN tunnel, never public.
#
# The range comes from up.sh (manifest remote.mosh_ports, default
# 60000:60010) — per manifest because host ports are exclusive: two mosh
# containers on one host need disjoint ranges, exactly like ssh.port.
# up.sh is the single source; the env var below also drives the in-image
# mosh-server wrapper (via /etc/environment) and init-firewall.sh's
# inbound UDP accept, so publish, server, and firewall cannot disagree.

services:
  dev-agent:
    ports:
      - "${SSH_BIND:-127.0.0.1}:${MOSH_PORTS_DASH:-60000-60010}:${MOSH_PORTS_DASH:-60000-60010}/udp"
    environment:
      - MOSH_PORTS=${MOSH_PORTS:-60000:60010}
