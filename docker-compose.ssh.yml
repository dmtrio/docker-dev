# docker-compose.ssh.yml — overlay added by up.sh when the manifest has an
# ssh: section. Publishes the container's sshd and enables it at runtime.
# Never public-facing by itself: bind defaults to 127.0.0.1; on a remote
# host set ssh.bind in the manifest deliberately (and front with your
# WireGuard/VPN tunnel — not the open internet).

services:
  dev-agent:
    ports:
      - "${SSH_BIND:-127.0.0.1}:${SSH_PORT}:22"
    environment:
      - SSH_ENABLED=true
      - SSH_AUTHORIZED_KEY=${SSH_AUTHORIZED_KEY:-}
      # RFC 04: land interactive SSH/mosh logins in a durable shared tmux
      # session (the entrypoint persists this into /etc/environment so
      # PAM-built SSH session envs see it).
      - REMOTE_TMUX=${REMOTE_TMUX:-false}
