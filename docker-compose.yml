# docker-compose.yml
# Template for a single Agent dev container.
# Launched via new-container.sh — don't run directly.

services:
  dev-agent:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        USERNAME: coder
        USER_UID: 1000
        USER_GID: 1000
        AUTHORIZED_KEY: "${AUTHORIZED_KEY}"
        INSTALL_CLAUDE: "${INSTALL_CLAUDE:-true}"
        INSTALL_AIDER: "${INSTALL_AIDER:-true}"
        INSTALL_GEMINI: "${INSTALL_GEMINI:-true}"

    container_name: dev-agent-${CONTAINER_NAME}
    hostname: ${CONTAINER_NAME}

    labels:
      net.unraid.docker.icon: "${DOCKER_ICON:-}"

    restart: unless-stopped

    environment:
      - CONTAINER_NAME=${CONTAINER_NAME}
      - GIT_USER_NAME=${GIT_USER_NAME:-}
      - GIT_USER_EMAIL=${GIT_USER_EMAIL:-}
      - TZ=America/Chicago

    volumes:
      # ── Project workspace ──────────────────────────────────────────────────
      - ${PROJECT_PATH}:/workspace

      # ── Shared across all containers ──────────────────────────────────────
      - ${SHARED_PATH}/claude:/home/coder/.claude
      - ${FORGE_AUTH_PATH}:${FORGE_AUTH_MOUNT}

    networks:
      br0:
        ipv4_address: ${CONTAINER_IP}

    mem_limit: 2g
    memswap_limit: 2g

networks:
  br0:
    external: true
