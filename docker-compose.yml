# docker-compose.yml
# Template for a single Claude Code dev container.
# Launched via new-container.sh — don't run directly.

services:
  claude-dev:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        USERNAME: coder
        USER_UID: 1000
        USER_GID: 1000
        AUTHORIZED_KEY: "${AUTHORIZED_KEY}"

    container_name: claude-dev-${CONTAINER_NAME}
    hostname: ${CONTAINER_NAME}

    restart: unless-stopped

    environment:
      - CONTAINER_NAME=${CONTAINER_NAME}
      - GIT_USER_NAME=${GIT_USER_NAME:-}
      - GIT_USER_EMAIL=${GIT_USER_EMAIL:-}
      - TZ=America/Chicago

    volumes:
      # ── Project workspace ──────────────────────────────────────────────────
      - ${PROJECT_PATH}:/workspace

      # ── Shared across all containers (siblings under SHARED_PATH) ─────────
      - ${SHARED_PATH}/claude-auth:/home/coder/.claude
      - ${SHARED_PATH}/gh-auth:/home/coder/.config/gh

    networks:
      br0:
        ipv4_address: ${CONTAINER_IP}

    mem_limit: 2g
    memswap_limit: 2g

networks:
  br0:
    external: true
