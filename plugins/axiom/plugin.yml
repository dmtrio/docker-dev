# axiom — Axiom's official MCP, bridged to LOCAL stdio via `mcp-remote` so EVERY
# agent (claude, cursor, gemini, codex; pi once its adapter is installed) reaches
# it uniformly, not just Claude. mcp-remote (baked into the image by the install:
# block) is a stdio↔HTTP proxy to mcp.axiom.co; being a local command server it
# wires into every agent through the ordinary local-plugin path — no per-agent
# remote-header injection. Axiom documents exactly this bridge (mcp-remote <url>).
# See ./README.md.
#
# Agent-scoped secret WITH a global fallback (scope: agent, global: true) — the
# token gates WHICH agents get axiom:
#   • one global AXIOM_TOKEN in secrets.env → shared by every agent
#   • per-agent AXIOM_KEY_<agent> → only the agents that hold a key get axiom
#     (an agent with no token never sees the server)
# The token is delivered into each bound agent's shim env (keyfiles.sh) and
# mcp-remote itself substitutes ${AXIOM_TOKEN} into the header at connect time.
# So the secret is in NO MCP config file AND never on the process command line
# (argv holds the literal "${AXIOM_TOKEN}", not the value). Bind it in a manifest:
#   # global: put AXIOM_TOKEN in secrets.env → every agent
#   agent_secrets:                              # per-agent override / gating
#     - {agent: cursor-agent, slot: AXIOM_TOKEN, secret: AXIOM_KEY_cursor}
#
# The server execs the baked `mcp-remote` binary directly (not `npx`), so process
# startup never reaches for the npm registry — it runs fully offline.

install: |
  # Bake the stdio↔remote bridge at build time (full network) so it runs offline
  # behind the runtime egress firewall. node/npm come from the fnm env eval.
  npm install -g mcp-remote

secrets:
  AXIOM_TOKEN: {scope: agent, global: true, hint: "axiom (an Axiom API token — Settings → API tokens; a scoped token 'xaat-…' is simplest). Global for every agent; gate/override one agent with AXIOM_KEY_<agent>."}

egress:
  - mcp.axiom.co

mcp:
  axiom:
    command: mcp-remote
    args: ["https://mcp.axiom.co/mcp", "--header", "Authorization: Bearer ${AXIOM_TOKEN}"]
