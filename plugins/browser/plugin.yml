# browser — watchable desktop browser the agent drives. Remote HTTP host service
# on 8814. See ./README.md. Config only; nothing baked.

host_port: 8814                        # firewall grant → HOST_MCP_PORTS

secrets:
  RESEARCH_BROWSER_KEY: {hint: "browser (run ./service.sh browser once)"}

mcp:
  browser:
    url: http://host.docker.internal:8814/mcp
    headers: {X-API-Key: "${RESEARCH_BROWSER_KEY}"}
    requires: [RESEARCH_BROWSER_KEY]
