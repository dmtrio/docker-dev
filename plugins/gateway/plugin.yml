# gateway — headless Playwright MCP gateway. Remote HTTP host service on 8811.
# See ./README.md (what it is, how to start it, security). Config only; nothing baked.

host_port: 8811                        # firewall grant → HOST_MCP_PORTS

# A common default can be overridden or disabled for individual agents.
secrets:
  MCP_GATEWAY_TOKEN: {hint: "gateway (run ./service.sh gateway once)"}

mcp:
  coding:
    url: http://host.docker.internal:8811/mcp
    headers: {Authorization: "Bearer ${MCP_GATEWAY_TOKEN}"}
    requires: [MCP_GATEWAY_TOKEN]
