# obsidian-annotated — remote MCP at mcp-obsidian.dmetr.io (a real internet host,
# reached via egress, so no host_port). Its required secret resolves per agent,
# so the server is wired only where an effective key exists. See ./README.md.

secrets:
  OBSIDIAN_ANNOTATED_KEY: {}

egress:
  - mcp-obsidian.dmetr.io

mcp:
  obsidian-annotated:
    url: https://mcp-obsidian.dmetr.io/mcp
    headers: {Authorization: "Bearer ${OBSIDIAN_ANNOTATED_KEY}"}
    requires: [OBSIDIAN_ANNOTATED_KEY]
