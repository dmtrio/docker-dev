# obsidian-annotated — remote MCP at mcp-obsidian.dmetr.io (a real internet host,
# reached via egress, so no host_port). Agent-scoped secret: each agent presents
# its own key and the server is wired only for bound agents. See ./README.md.

secrets:
  OBSIDIAN_ANNOTATED_KEY: agent          # per-agent: each agent wears its own key

egress:
  - mcp-obsidian.dmetr.io

mcp:
  obsidian-annotated:
    url: https://mcp-obsidian.dmetr.io/mcp
    headers: {Authorization: "Bearer ${OBSIDIAN_ANNOTATED_KEY}"}
