# plugins/proxyman.yml — a REMOTE MCP server (HTTP) reached on the docker host
# (bin/run-proxyman-bridge.sh — Proxyman traffic capture). No `install:` block:
# nothing is baked, only `url:` config. Enable per container with:
#
#   plugins: [proxyman]
#
# up.sh grants firewall access to host_port and wires `mcp` into Claude's
# .mcp.json. The bridge key is container-wide (env-scoped): every agent
# presents the same value, delivered via each shim's <agent>.env.
#
# Migrated from the old `capabilities: {proxyman: true}` flag (PLN - Plugins
# v2, Phase 1); `capabilities:` still works as deprecated sugar for one release.

host_port: 8813                        # folds into HOST_MCP_PORTS (firewall grant)

secrets:
  PROXYMAN_BRIDGE_KEY: {scope: env, hint: "proxyman (run bin/run-proxyman-bridge.sh once)"}

mcp:
  proxyman:
    url: http://host.docker.internal:8813/mcp
    headers: {X-API-Key: "${PROXYMAN_BRIDGE_KEY}"}
