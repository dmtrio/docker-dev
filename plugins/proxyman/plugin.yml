# proxyman — Proxyman traffic-capture bridge. Remote HTTP host service on 8813.
# See ./README.md. Config only; nothing baked.

host_port: 8813                        # firewall grant → HOST_MCP_PORTS

secrets:
  PROXYMAN_BRIDGE_KEY: {scope: env, hint: "proxyman (run ./service.sh proxyman once)"}

mcp:
  proxyman:
    url: http://host.docker.internal:8813/mcp
    headers: {X-API-Key: "${PROXYMAN_BRIDGE_KEY}"}
