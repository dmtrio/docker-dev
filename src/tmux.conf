# tmux.conf — baked to /home/coder/.tmux.conf (RFC 04 remote access).
# Mobile-friendly defaults: mouse/touch scrolling, deep history for agent
# transcripts, a status line that says where you are at a glance.

set -g mouse on
set -g history-limit 50000
set -g default-terminal "tmux-256color"
set -g escape-time 10
setw -g aggressive-resize on

# Status: container hostname + current pane's git branch + clock
set -g status-interval 5
set -g status-left-length 30
set -g status-left "#[bold]#H #[default]"
set -g status-right "#(cd #{pane_current_path} 2>/dev/null && git rev-parse --abbrev-ref HEAD 2>/dev/null) %H:%M"

# Notify hook (RFC 04 Phase B): when NTFY_URL is present in the environment,
# alert after a pane has been silent for 30s — the agnostic "agent went idle
# at a prompt" signal — and let tmux-notify.sh decide whether to push (it
# suppresses when a client is attached, i.e. you're already looking).
if-shell '[ -n "$NTFY_URL" ]' \
    'set -g monitor-silence 30 ; set-hook -g alert-silence "run-shell /usr/local/bin/tmux-notify.sh"'
