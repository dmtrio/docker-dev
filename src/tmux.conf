# tmux.conf — baked to /home/coder/.tmux.conf (RFC 04 remote access).
# Mobile-friendly defaults: mouse/touch scrolling, deep history for agent
# transcripts, a status line that says where you are at a glance.

set -g mouse on
set -g history-limit 50000
set -g default-terminal "tmux-256color"
set -g escape-time 10
setw -g aggressive-resize on

# Status: container hostname + current pane's git branch + clock. 15s
# interval: the only per-tick element has minute resolution, and every
# redraw is pushed over SSH/mosh to attached (often cellular) clients.
set -g status-interval 15
set -g status-left-length 30
set -g status-left "#[bold]#H #[default]"
set -g status-right "#(cd #{pane_current_path} 2>/dev/null && git rev-parse --abbrev-ref HEAD 2>/dev/null) %H:%M"

# Notify hook (RFC 04 Phase B): when NTFY_URL is present in the environment,
# alert after a window has been silent for 30s — the agnostic "agent went
# idle at a prompt" signal — and let tmux-notify.sh decide whether to push
# (it suppresses when a client is attached, i.e. you're already looking).
# silence-action any is LOAD-BEARING: the default ('other') alerts only for
# non-current windows, and the landing session's single window is always
# current — without this the hook never fires at all. #{hook_window} hands
# the script the window that actually went silent (formats expand when the
# hook runs), so the push shows the right pane, not session agent's front.
if-shell '[ -n "$NTFY_URL" ]' 'set -g monitor-silence 30'
if-shell '[ -n "$NTFY_URL" ]' 'set -g silence-action any'
if-shell '[ -n "$NTFY_URL" ]' 'set-hook -g alert-silence "run-shell \"/usr/local/bin/tmux-notify.sh #{hook_window}\""'
